plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.sodoma.lloydboom"
    // 요구사항에 맞춰 36으로 상향
    compileSdkVersion 36 
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.sodoma.lloydboom"
        minSdkVersion 23
        // 요구사항에 맞춰 36으로 상향
        targetSdkVersion 36 
        versionCode 1
        versionName "1.0"
        
        // 라이브러리 의존성 충돌 방지 설정
        multiDexEnabled true
    }

    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}
